# Shirabe — minimal compose for a homelab where slskd and Navidrome are
# already running elsewhere. Spins up only what this project owns:
#
#   shirabe        — the app itself (port 3000)
#   flaresolverr   — Cloudflare-resolving proxy for RYM/AOTY scraper sources
#
# Point Shirabe at your existing slskd + navidrome via the Settings UI
# after first boot. If you're setting all of those up fresh and want them
# in this same compose stack, uncomment the slskd + navidrome services at
# the bottom of this file.
#
# First-time setup:
#   cp .env.example .env
#   edit SECRET_KEY (openssl rand -hex 48)
#   docker compose up -d --build
#
# Volumes:
#   ./data         — Shirabe's SQLite + caches (DO NOT DELETE)
#   ./downloads    — slskd's download landing dir; mount the same host
#                    path here as wherever your slskd writes
#   ./music        — navidrome's library dir; mount the same host path
#                    here as wherever your navidrome reads from
#   ./beets_config.yaml  — your beets config (copy from .example)

services:
  shirabe:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: shirabe
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in .env}
      DATABASE_URL: /data/shirabe.db
      PORT: "3000"
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      BEETS_BIN: beet
      BEETS_CONFIG: /etc/beets/config.yaml
      DOWNLOADS_DIR: /downloads
      MUSIC_DIR: /music
      # NAVIDROME_URL is read once at startup as a fallback default; the
      # Settings UI value (navidrome_url) takes precedence after first boot.
      NAVIDROME_URL: ${NAVIDROME_URL:-}
      # Optional first-run seeding — only applied when the settings table
      # is empty. Set any of these in .env to skip the first-run walkthrough.
      BOOT_LASTFM_API_KEY: ${BOOT_LASTFM_API_KEY:-}
      BOOT_LASTFM_SHARED_SECRET: ${BOOT_LASTFM_SHARED_SECRET:-}
      BOOT_LASTFM_USERNAME: ${BOOT_LASTFM_USERNAME:-}
      BOOT_LISTENBRAINZ_USERNAME: ${BOOT_LISTENBRAINZ_USERNAME:-}
      BOOT_LISTENBRAINZ_TOKEN: ${BOOT_LISTENBRAINZ_TOKEN:-}
      BOOT_SLSKD_URL: ${BOOT_SLSKD_URL:-}
      BOOT_SLSKD_API_KEY: ${BOOT_SLSKD_API_KEY:-}
      BOOT_NAVIDROME_URL: ${BOOT_NAVIDROME_URL:-}
      BOOT_NAVIDROME_USERNAME: ${BOOT_NAVIDROME_USERNAME:-}
      BOOT_NAVIDROME_PASSWORD: ${BOOT_NAVIDROME_PASSWORD:-}
      BOOT_RELAY_LASTFM: ${BOOT_RELAY_LASTFM:-}
      BOOT_RELAY_LISTENBRAINZ: ${BOOT_RELAY_LISTENBRAINZ:-}
      BOOT_SUGGESTION_SCHEDULE: ${BOOT_SUGGESTION_SCHEDULE:-}
      BOOT_DISMISS_COOLDOWN_DAYS: ${BOOT_DISMISS_COOLDOWN_DAYS:-}
    volumes:
      - ./data:/data
      - ./downloads:/downloads
      - ./music:/music
      - ./beets_config.yaml:/etc/beets/config.yaml:ro
    depends_on:
      - flaresolverr

  # Discord bot exposing `/nowplaying` as a user-installable slash command.
  # Reaches Shirabe via the internal docker network — no public exposure
  # of the server needed for this to work in any chat/DM/server.
  # First-time only: `docker compose run --rm discord-bot npm run register`
  # to publish the slash command to Discord (idempotent; safe to re-run).
  discord-bot:
    build:
      context: .
      dockerfile: discord-bot/Dockerfile
    container_name: shirabe-discord-bot
    restart: unless-stopped
    environment:
      DISCORD_APP_ID: ${DISCORD_APP_ID:?set DISCORD_APP_ID in .env}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:?set DISCORD_BOT_TOKEN in .env}
      SHIRABE_URL: http://shirabe:3000
      # Used only for cover-art URLs in the embed — Discord's image proxy
      # needs a URL it can reach. Leave unset to skip thumbnails.
      SHIRABE_PUBLIC_URL: ${SHIRABE_PUBLIC_URL:-}
    depends_on:
      - shirabe

  # Headless-browser proxy that resolves Cloudflare challenge pages so the
  # RYM and AOTY scraper sources can actually return results. After first
  # boot, paste `http://flaresolverr:8191/v1` into Shirabe → Settings →
  # Cloudflare bypass.
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: shirabe-flaresolverr
    restart: unless-stopped
    environment:
      LOG_LEVEL: info
      LOG_HTML: "false"
      CAPTCHA_SOLVER: none
      TZ: ${TZ:-UTC}
    # No port exposure — Shirabe reaches it via the internal docker network.

# ============================================================================
# Optional: fresh-install slskd + navidrome
# ============================================================================
#
# If you don't already have slskd and navidrome running, uncomment the
# block below to spin them up alongside Shirabe. Otherwise leave commented
# and point Shirabe at your existing instances via Settings (or BOOT_*
# vars in .env).
#
# Remember to keep `./downloads` shared between shirabe and slskd, and
# `./music` shared between shirabe and navidrome.
#
#   slskd:
#     image: slskd/slskd:latest
#     container_name: slskd
#     restart: unless-stopped
#     ports:
#       - "5030:5030"
#       - "50300:50300"
#     environment:
#       SLSKD_REMOTE_CONFIGURATION: "true"
#     volumes:
#       - ./slskd:/app
#       - ./downloads:/downloads
#
#   navidrome:
#     image: deluan/navidrome:latest
#     container_name: navidrome
#     restart: unless-stopped
#     ports:
#       - "4533:4533"
#     environment:
#       ND_LOGLEVEL: info
#       ND_SCANSCHEDULE: 1h
#     volumes:
#       - ./navidrome:/data
#       - ./music:/music
